<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIYENA ACADEMY - MANAGEMENT SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #d32f2f;
            --g6: #1a3a5f; --g7: #00a8cc; --g8: #c0392b; 
            --g9: #d35400; --g10: #f39c12; --g11: #f1c40f;
            --yt-red: #FF0000;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: #f4f4f4; 
            text-align: center;
            /* පසුබිම් පින්තූරය - පින්තූරයේ නම background.jpg ලෙස සේව් කරන්න */
            background-image: linear-gradient(rgba(244, 244, 244, 0.88), rgba(244, 244, 244, 0.88)), 
                              url('background.jpg'); 
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        header { 
            background: white; 
            padding: 40px 20px; 
            border-bottom: 5px solid var(--primary-red); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        /* Logo එකේ නම logo.png ලෙස සේව් කරන්න */
        .logo { width: 150px; height: auto; margin-bottom: 15px; }
        h1 { margin: 0; font-size: 48px; color: #222; font-weight: 800; text-transform: uppercase; }
        .tagline { color: var(--primary-red); font-weight: bold; letter-spacing: 6px; text-transform: uppercase; font-size: 16px; }

        .grade-bar { display: flex; width: 100%; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grade-card { flex: 1; height: 100px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; text-decoration: none; border-right: 1px solid rgba(255,255,255,0.1); }
        .grade-card:hover { filter: brightness(1.1); transform: translateY(5px); }
        
        .c6 { background: var(--g6); } .c7 { background: var(--g7); } .c8 { background: var(--g8); }
        .c9 { background: var(--g9); } .c10 { background: var(--g10); } .c11 { background: var(--g11); }

        #grade8-menu { display: none; padding: 50px 20px; animation: fadeIn 0.5s; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 1100px; margin: auto; }
        .menu-item { padding: 35px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border-bottom: 5px solid rgba(0,0,0,0.2); }
        .menu-item:hover { transform: translateY(-5px); }
        
        .m-sci { background: #c0392b; } .m-ict { background: #2980b9; } .m-his { background: #16a085; } .m-att { background: #f39c12; } .m-hw { background: #d35400; }
        
        .back-btn { background: #222; color: white; border: none; padding: 15px 40px; border-radius: 30px; cursor: pointer; margin-top: 40px; font-weight: bold; }

        .youtube-footer { margin: 80px 0 40px 0; padding: 20px; }
        .yt-button { display: inline-flex; align-items: center; background-color: white; color: #222; text-decoration: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; font-size: 18px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: 0.3s ease; border: 2px solid transparent; }
        .yt-button i { color: var(--yt-red); font-size: 30px; margin-right: 15px; }
        .yt-button:hover { transform: scale(1.05); background-color: var(--yt-red); color: white; box-shadow: 0 15px 30px rgba(255, 0, 0, 0.3); }
        .yt-button:hover i { color: white; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <img src="logo.png" class="logo" alt="Siyena Logo">
    <h1>SIYENA ACADEMY</h1>
    <div class="tagline">Learning Management System</div>
</header>

<div id="home-view">
    <div class="grade-bar">
        <div class="grade-card c6">GRADE 06</div>
        <div class="grade-card c7">GRADE 07</div>
        <div class="grade-card c8" onclick="openGrade8()">GRADE 08</div>
        <div class="grade-card c9">GRADE 09</div>
        <div class="grade-card c10">GRADE 10</div>
        <div class="grade-card c11">GRADE 11</div>
    </div>
    
    <div style="padding: 100px 20px;">
        <h2 style="color: #444; font-size: 28px;">Welcome to Siyena Academy Digital Portal</h2>
        <p style="color: #666;">Select your grade to manage records.</p>
    </div>
</div>

<div id="grade8-menu">
    <h2 style="color: var(--g8); margin-bottom: 40px; background: white; display: inline-block; padding: 12px 30px; border-radius: 50px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">GRADE 08 MANAGEMENT PANEL</h2>
    <div class="menu-grid">
        <div class="menu-item m-sci" onclick="window.location.href='SCIENCE FEES.HTML'">SCIENCE FEES</div>
        <div class="menu-item m-ict" onclick="window.location.href='ICT FEES.HTML'">ICT FEES</div>
        <div class="menu-item m-his" onclick="window.location.href='HISTORY FEES.HTML'">HISTORY FEES</div>
        <div class="menu-item m-att" onclick="window.location.href='attendance.html'">ATTENDANCE</div>
        <div class="menu-item m-hw" onclick="window.location.href='HOMEWORK.HTML'">HOMEWORK</div>
    </div>
    <button class="back-btn" onclick="goHome()">← BACK TO HOME</button>
</div>

<div class="youtube-footer">
    <a href="https://www.youtube.com/channel/UCv3kS_F59tJSQPhIBB2LCIQ" target="_blank" class="yt-button">
        <i class="fab fa-youtube"></i>
        COMMENT US
    </a>
</div>

<script>
    function openGrade8() {
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('grade8-menu').style.display = 'block';
    }
    function goHome() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('grade8-menu').style.display = 'none';
    }
</script>

</body>
</html>
